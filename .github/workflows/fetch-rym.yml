name: Fetch RYM feed

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:
  push:
    paths:
      - 'scripts/fetch_rym.py'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Fetch RYM RSS and write rym.json
        run: |
          python3 scripts/fetch_rym.py
      - name: Commit rym.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rym.json || true
          if git diff --staged --quiet; then echo 'No changes to commit'; else git commit -m "chore: update rym.json" && git push origin HEAD:main; fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
