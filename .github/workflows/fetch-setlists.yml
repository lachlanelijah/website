name: Fetch setlists

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Run fetcher
        env:
          SETLISTFM_API_KEY: ${{ secrets.SETLISTFM_API_KEY }}
        run: |
          python3 scripts/fetch_setlists.py
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add data/setlists.json || true
          git commit -m "Update setlists.json" || echo "no changes"
          git push origin HEAD:main
